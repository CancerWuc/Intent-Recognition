<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iservice智能客服助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1B2537 0%, #2D3748 100%);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #1B2537 0%, #232D3F 100%);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(255,255,255,0.1) 20%, 
                rgba(255,255,255,0.1) 80%, 
                transparent 100%);
        }

        .sidebar-header {
            padding: 24px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sidebar-title {
            font-weight: 600;
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.5px;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, #C41230, #A0102A);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(196, 18, 48, 0.3);
        }

        .new-chat-btn:hover {
            background: linear-gradient(135deg, #A0102A, #800D22);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(196, 18, 48, 0.4);
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .session-list::-webkit-scrollbar {
            width: 4px;
        }

        .session-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .session-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .session-item {
            padding: 14px 16px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .session-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.1);
        }

        .session-item.active {
            background: linear-gradient(135deg, #C41230, #A0102A);
            color: white;
            border-color: rgba(196, 18, 48, 0.5);
            box-shadow: 0 4px 15px rgba(196, 18, 48, 0.25);
        }

        .session-item.active:hover {
            background: linear-gradient(135deg, #A0102A, #800D22);
        }

        .session-item .session-id {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 4px;
        }

        .session-item.active .session-id {
            color: rgba(255,255,255,0.7);
        }

        .session-item .session-preview {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.85);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-item.active .session-preview {
            color: white;
        }

        .container {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #FAFBFC 0%, #F0F2F5 100%);
            overflow: hidden;
        }

        .header {
            padding: 20px 32px;
            background: linear-gradient(135deg, #1B2537 0%, #2D3748 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #fff, rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .session-actions {
            display: flex;
            gap: 10px;
        }

        .session-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .session-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
        }

        .chat-container {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.15);
            border-radius: 3px;
        }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(135deg, #C41230, #A0102A);
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(196, 18, 48, 0.2);
        }

        .system-message {
            background: white;
            color: #1F2937;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .agent-info {
            font-size: 11px;
            color: #9CA3AF;
            margin-bottom: 6px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-content {
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 14px;
        }

        .message-info {
            font-size: 11px;
            color: #9CA3AF;
            margin-top: 6px;
        }

        .input-section {
            padding: 20px 32px 24px;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .input-container {
            display: flex;
            gap: 14px;
            align-items: flex-end;
            background: #F7F8FA;
            padding: 8px;
            border-radius: 16px;
            border: 1px solid #E5E7EB;
            transition: all 0.2s ease;
        }

        .input-container:focus-within {
            border-color: #C41230;
            box-shadow: 0 0 0 3px rgba(196, 18, 48, 0.1);
            background: white;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: transparent;
            resize: none;
            min-height: 48px;
            max-height: 120px;
        }

        input:focus {
            outline: none;
        }

        button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #C41230, #A0102A);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(196, 18, 48, 0.25);
        }

        button:hover {
            background: linear-gradient(135deg, #A0102A, #800D22);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(196, 18, 48, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        .stop-btn {
            display: none;
            padding: 12px 24px;
            background: linear-gradient(135deg, #6B7280, #4B5563);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 10px rgba(107, 114, 128, 0.25);
        }

        .stop-btn:hover {
            background: linear-gradient(135deg, #4B5563, #374151);
            transform: translateY(-1px);
        }

        .loading-message {
            background: white;
            color: #1F2937;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 16px;
        }

        .loading-message .loading-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #E8EAED;
            border-top: 2px solid #C41230;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-message .loading-text {
            color: #6B7280;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }

            .header {
                padding: 16px 20px;
            }

            h1 {
                font-size: 16px;
            }

            .chat-container {
                padding: 20px;
            }

            .input-section {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧会话列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">会话列表</div>
                <button class="new-chat-btn" onclick="createNewChat()">新建对话</button>
            </div>
            <div class="session-list" id="sessionList">
                <!-- 会话列表将在这里动态添加 -->
            </div>
        </div>

        <!-- 右侧聊天区域 -->
        <div class="container">
            <div class="header">
                <h1>iservice智能客服助手</h1>
                <div class="session-info">
                    <div class="session-actions">
                        <button class="session-btn" onclick="clearSession()">清空当前会话</button>
                    </div>
                </div>
            </div>
            
            <div class="chat-container" id="chatContainer">
                <!-- 消息将在这里动态添加 -->
            </div>
            
            <div class="input-section">
                <div class="input-container">
                    <input id="userInput" placeholder="请输入您的问题，例如：查询贵州茅台的股票信息" />
                    <button id="sendBtn" onclick="recognize()">发送</button>
                    <button class="stop-btn" id="stopBtn" onclick="stopGeneration()">停止</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAbortController = null;
        let currentReader = null;
        let currentSessionId = null;

        function setStreaming(isStreaming) {
            const sendBtn = document.getElementById('sendBtn');
            const stopBtn = document.getElementById('stopBtn');
            const input = document.getElementById('userInput');
            if (isStreaming) {
                sendBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                input.disabled = true;
                input.style.opacity = '0.5';
            } else {
                sendBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                input.disabled = false;
                input.style.opacity = '1';
                input.focus();
                currentAbortController = null;
                currentReader = null;
            }
        }

        function saveCurrentSessionId(sid) {
            currentSessionId = sid;
            localStorage.setItem('currentSessionId', sid);
        }

        async function createNewChat() {
            try {
                const response = await fetch('/api/session/new', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.success) {
                    saveCurrentSessionId(data.session_id);
                    document.getElementById('chatContainer').innerHTML = '';
                    addMessage('你好！我是iservice智能客服助手，请问有什么可以帮助你的？', false);
                    loadSessionList();
                } else {
                    alert('创建新会话失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('创建新会话失败: ' + error.message);
            }
        }

        async function loadSessionList() {
            try {
                const response = await fetch('/api/session/list');
                const data = await response.json();
                if (data.success) {
                    const sessionList = document.getElementById('sessionList');
                    sessionList.innerHTML = '';
                    data.sessions.forEach(s => {
                        const sessionItem = document.createElement('div');
                        sessionItem.className = 'session-item' + (s.session_id === currentSessionId ? ' active' : '');
                        const preview = s.latest_message || '空会话';
                        const shortId = s.session_id.substring(0, 8);
                        sessionItem.innerHTML = `
                            <div class="session-id">会话 ${shortId}...</div>
                            <div class="session-preview">${preview}</div>
                        `;
                        sessionItem.onclick = () => selectSession(s.session_id);
                        sessionList.appendChild(sessionItem);
                    });
                }
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }

        async function selectSession(sessionId) {
            saveCurrentSessionId(sessionId);
            await loadSessionHistory(sessionId);
            loadSessionList();
        }

        function stopGeneration() {
            if (currentReader) {
                currentReader.cancel().catch(() => {});
            }
            if (currentAbortController) {
                currentAbortController.abort();
            }
            removeLoadingMessage();
            setStreaming(false);
        }

        function addMessage(message, isUser = false, agentName = '') {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? 'message user-message' : 'message system-message';
            let agentInfo = '';
            if (!isUser && agentName) {
                agentInfo = `<div class="agent-info">来自: ${agentName}</div>`;
            }
            messageDiv.innerHTML = `
                ${agentInfo}
                <div class="message-content">${message}</div>
                <div class="message-info">${new Date().toLocaleTimeString()}</div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        function addLoadingMessage(text) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message loading-message';
            messageDiv.id = 'loadingMsg';
            messageDiv.innerHTML = `
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">${text}</div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateLoadingText(text) {
            const el = document.getElementById('loadingText');
            if (el) el.textContent = text;
        }

        function removeLoadingMessage() {
            const el = document.getElementById('loadingMsg');
            if (el) el.remove();
        }

        function recognize() {
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput) {
                alert('请输入内容');
                return;
            }
            if (!currentSessionId) {
                alert('会话未初始化，请刷新页面');
                return;
            }

            addMessage(userInput, true);
            document.getElementById('userInput').value = '';
            setStreaming(true);
            addLoadingMessage('正在识别意图...');

            fetch('/api/recognize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: userInput })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const method = data.recognition_method === 'embedding' ? 'Embedding向量匹配' : 'LLM推理';
                    const confidence = data.confidence ? (data.confidence * 100).toFixed(1) : '0';
                    updateLoadingText(`识别完成 [${method}, 置信度: ${confidence}%] → 正在调用 Agent: ${data.agent_name || '无'}...`);

                    const msgDiv = addMessage('', false, data.agent_name);
                    msgDiv.style.display = 'none';
                    const contentEl = msgDiv.querySelector('.message-content');
                    let firstChunk = true;

                    const abortController = new AbortController();
                    currentAbortController = abortController;

                    return fetch('/api/recognize/execute/stream', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ input: userInput, agent_id: data.agent_id, session_id: currentSessionId }),
                        signal: abortController.signal
                    }).then(response => {
                        const reader = response.body.getReader();
                        currentReader = reader;
                        const decoder = new TextDecoder();
                        let buffer = '';

                        function read() {
                            reader.read().then(({ done, value }) => {
                                if (done) {
                                    removeLoadingMessage();
                                    msgDiv.style.display = '';
                                    loadSessionList();
                                    setStreaming(false);
                                    return;
                                }
                                buffer += decoder.decode(value, { stream: true });
                                const lines = buffer.split('\n');
                                buffer = lines.pop();
                                for (const line of lines) {
                                    if (line.startsWith('data: ')) {
                                        const payload = line.slice(6);
                                        if (payload.trim() === '[DONE]') {
                                            removeLoadingMessage();
                                            msgDiv.style.display = '';
                                            loadSessionList();
                                            setStreaming(false);
                                            return;
                                        }
                                        try {
                                            const chunk = JSON.parse(payload);
                                            if (chunk.error) {
                                                removeLoadingMessage();
                                                msgDiv.style.display = '';
                                                contentEl.textContent += '错误: ' + chunk.error;
                                                setStreaming(false);
                                            } else if (chunk.content) {
                                                if (firstChunk) {
                                                    firstChunk = false;
                                                    removeLoadingMessage();
                                                    msgDiv.style.display = '';
                                                }
                                                contentEl.textContent += chunk.content;
                                                document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
                                            }
                                        } catch (e) {}
                                    }
                                }
                                read();
                            }).catch(err => {
                                if (err.name === 'AbortError') {
                                    if (contentEl.textContent) {
                                        contentEl.textContent += ' [已停止]';
                                    } else {
                                        msgDiv.remove();
                                    }
                                } else {
                                    removeLoadingMessage();
                                    msgDiv.style.display = '';
                                    contentEl.textContent += '读取错误: ' + err.message;
                                }
                                setStreaming(false);
                            });
                        }
                        read();
                    }).catch(err => {
                        if (err.name === 'AbortError') {
                            if (contentEl.textContent) {
                                contentEl.textContent += ' [已停止]';
                                msgDiv.style.display = '';
                            } else {
                                msgDiv.remove();
                            }
                        } else {
                            removeLoadingMessage();
                            msgDiv.style.display = '';
                            contentEl.textContent += '请求错误: ' + err.message;
                        }
                        setStreaming(false);
                    });
                } else {
                    removeLoadingMessage();
                    addMessage(`识别失败：${data.error}`, false);
                    setStreaming(false);
                }
            })
            .catch(error => {
                removeLoadingMessage();
                addMessage(`请求失败：${error.message}`, false);
                setStreaming(false);
            });
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                recognize();
            }
        });

        async function loadSessionHistory(sessionId) {
            if (!sessionId) return;
            try {
                const response = await fetch(`/api/session/history?session_id=${sessionId}`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('chatContainer').innerHTML = '';
                    if (data.history.length > 0) {
                        data.history.forEach(item => {
                            if (item.user_input) addMessage(item.user_input, true);
                            if (item.response && item.response !== '新会话') addMessage(item.response, false, item.agent_name);
                        });
                    }
                    if (document.getElementById('chatContainer').innerHTML.trim() === '') {
                        addMessage('你好！我是iservice智能客服助手，请问有什么可以帮助你的？', false);
                    }
                }
            } catch (error) {
                console.error('加载会话历史失败:', error);
            }
        }

        async function clearSession() {
            if (!currentSessionId) return;
            if (confirm('确定要清空当前会话的历史记录吗？')) {
                try {
                    const response = await fetch('/api/session/clear', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: currentSessionId })
                    });
                    const data = await response.json();
                    if (data.success) {
                        document.getElementById('chatContainer').innerHTML = '';
                        addMessage('你好！我是iservice智能客服助手，请问有什么可以帮助你的？', false);
                        loadSessionList();
                    }
                } catch (error) {
                    console.error('清空会话失败:', error);
                    alert('清空会话失败');
                }
            }
        }

        async function initApp() {
            let savedSessionId = localStorage.getItem('currentSessionId');
            console.log('[initApp] 检查 localStorage 中的 currentSessionId:', savedSessionId);

            if (!savedSessionId) {
                console.log('[initApp] 没有保存的 session_id，创建新会话...');
                const response = await fetch('/api/session/new', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                
                if (data.success) {
                    saveCurrentSessionId(data.session_id);
                    document.getElementById('chatContainer').innerHTML = '';
                    addMessage('你好！我是iservice智能客服助手，请问有什么可以帮助你的？', false);
                    loadSessionList();
                } else {
                    console.error('创建新会话失败:', data.error);
                    alert('创建新会话失败');
                }
            } else {
                console.log('[initApp] 找到保存的 session_id，加载历史...');
                currentSessionId = savedSessionId;
                const historyResponse = await fetch(`/api/session/history?session_id=${savedSessionId}`);
                const historyData = await historyResponse.json();
                
                if (historyData.success && historyData.history && historyData.history.length > 0) {
                    await loadSessionHistory(savedSessionId);
                    loadSessionList();
                } else {
                    console.log('[initApp] 历史记录为空或加载失败，创建新会话...');
                    const response = await fetch('/api/session/new', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        saveCurrentSessionId(data.session_id);
                        addMessage('你好！我是iservice智能客服助手，请问有什么可以帮助你的？', false);
                        loadSessionList();
                    } else {
                        console.error('创建新会话失败:', data.error);
                        alert('创建新会话失败');
                    }
                }
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
